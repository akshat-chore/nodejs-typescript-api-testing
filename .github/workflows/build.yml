name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint, Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/test_db"
      PGUSER: postgres
      PGPASSWORD: password
      PGDATABASE: test_db
      NODE_ENV: test
      JWT: "test-secret-key-1234567890"
      PORT: 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/test_db" > .env
          echo "NODE_ENV=test" >> .env
          echo "JWT=test-secret-key-1234567890" >> .env
          echo "PORT=3000" >> .env

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check types
        run: yarn type-check

      - name: Lint code
        run: yarn lint

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy

      - name: Run Database Seed
        run: yarn prisma:seed

      - name: Build Application
        run: yarn build

      - name: Run Unit Tests
        run: yarn test:unit

      - name: Run Integration Tests
        run: |
          # Start server in background
          yarn start &
          # Wait for health endpoint to be ready
          npx wait-on http://localhost:3000/health --timeout 60000
          # Run integration tests
          yarn test:integration
